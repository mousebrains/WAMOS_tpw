# WAMOS parameters keyed by the tower name, lower case, in the polar file

# Global settings (used when tower-specific config is not available)

global:
  theta_refinement:
    enabled: True # Enable theta refinement across frames
    min_frames: 3 # Minimum frames needed for refinement

  shadow:
    range_fraction: 0.1 # fraction of range bins to use for detecting the shadow region

  bias:
    range: 0 # Range bias in meters
    theta: 0 # Theta bias in degrees

  offsets:
    bow_to_radar: 0 # BO2RA: Angle from bow to radar beam in degrees
    heading_delay: 0 # HDGDL: Heading delay correction in degrees
    compass: 0 # Compass offset correction in degrees

  deramp:
    order: 4 # Fit to 1 + 1/r + 1/r^2 + ... + 1/r^order

  dewind:
    order: 2 # Fit to polynomial of order

"roger revelle":
  theta_refinement: True # Tower-specific theta refinement settings

  shadow: # Shadow regions
    theta_refinement: True # Use shadow edges to refine theta bias frame by frame
    range_fraction: 0.1 # fraction of range bins to use for detecting the shadow region
    angle_range: 10 # +- degrees around expected shadow angles to search
    aft:  # Aft tower
      LHS: 145.36 # Expected LHS angle in degrees based on sample (high to low)
      RHS: 215.36 # Expected RHS angle in degrees based on sample (low to high)

  bias: # Bias parameters
    range: -6 # Range bias in meters
    theta: 10 # Theta bias in degrees

  offsets: # Coordinate offset parameters
    bow_to_radar: 0 # BO2RA: Angle from bow to radar beam in degrees
    heading_delay: 0 # HDGDL: Heading delay correction in degrees
    compass: 0 # Compass offset correction in degrees

  deramp: # Deramping parameters
    order: 4 # Fit to 1 + 1/r + 1/r^2 + ... + 1/r^order

  dewind: # Dewind parameters
    order: 2 # Fit to polynomial of order

