# R/V Roger Revelle WAMOS tower
#

tower_name: "Roger Revelle"

# BearingFrame configuration
bearing:
  # Range bin to use for bearing pulse detection
  # Bit 13 in this bin toggles at degree boundaries
  bearing_bin: 0

# TimingFrame configuration
timing:
  # Coarse timing signal (1 Hz, anchors to 1-second boundaries)
  coarse_signal: "1s"

  # Fine timing signal (16 Hz, provides 62.5 ms resolution)
  fine_signal: "62p5ms"

  # Default frame duration if not in metadata
  default_duration: 1.5

  # Optional: Override timing signal definitions
  # Format: signal_name: [bit, bin, period_seconds]
  # timing_signals:
  #   1s: [12, 18, 1.0]
  #   250ms: [14, 19, 0.25]
  #   125ms: [13, 19, 0.125]
  #   62p5ms: [12, 19, 0.0625]

shadow:
  # Shadow frame configuration (if applicable)
  enabled: false
  objects: # angle span plus a bit of the shadow regions
    - name: "Aft superstructure"
      start_angle: 130 # Relative to pointing angle of the radar, which is roughly the bow
      end_angle: 230

# Pipeline stages to execute (in order)
# Available stages: PolarFrame, BearingFrame, TimingFrame
pipeline:
  - PolarFrame
  - BearingFrame
  - TimingFrame
